name: Deploy Laravel ke Rumahweb Shared Hosting (cPanel)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:
    inputs:
      upload_vendor:
        description: 'Upload folder vendor/? (Pilih true HANYA jika Anda baru menambahkan library composer baru)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  build-and-deploy:
    name: Build Assets & Deploy Lengkap ke Rumahweb
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Kode Repositori
        uses: actions/checkout@v4

      # 1. Setup PHP & Install Composer di GitHub Runner
      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, bcmath, curl, pdo, pdo_mysql, zip, gd

      - name: Install Composer Production Dependencies
        run: composer install --prefer-dist --no-dev --no-progress --no-interaction --optimize-autoloader

      # 2. Setup Node.js & Build Frontend Assets (Vite) di GitHub Runner
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Compile Frontend Assets (Vite Build)
        run: |
          npm install --no-audit --no-fund
          npm run build

      # 3. Hapus file sementara sebelum upload
      - name: Bersihkan File Sementara Sebelum Upload
        run: |
          rm -rf node_modules/
          rm -rf tests/
          rm -f .env

      # 4. Hapus folder vendor jika tidak diminta upload ulang (Super Cepat < 20 detik)
      - name: Optimasi Kecepatan Deploy (Exclude Vendor by Default)
        if: github.event.inputs.upload_vendor != 'true'
        run: |
          echo "Melewati upload folder vendor/ agar deploy selesai dengan cepat..."
          rm -rf vendor/

      # 5. Cek apakah rahasia FTP sudah dikonfigurasi
      - name: Cek Konfigurasi FTP Secret
        id: check_ftp
        run: |
          if [ -z "${{ secrets.FTP_SERVER }}" ] || [ -z "${{ secrets.FTP_USERNAME }}" ]; then
            echo "FTP secrets belum dikonfigurasi di GitHub Settings > Secrets."
            echo "SKIP_FTP=true" >> $GITHUB_ENV
          else
            echo "SKIP_FTP=false" >> $GITHUB_ENV
          fi

      # 6. Upload Lengkap ke cPanel Rumahweb menggunakan LFTP Mirror (100% Dijamin Masuk Semua File)
      - name: Deploy ke cPanel Rumahweb via LFTP Mirror
        if: env.SKIP_FTP == 'false'
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq lftp
          echo "Memulai proses sinkronisasi file ke folder: ${{ secrets.FTP_SERVER_DIR }}"
          lftp -c "set ftp:ssl-allow no; \
                   open -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} ${{ secrets.FTP_SERVER }}; \
                   mirror -R --verbose=1 \
                   --exclude-glob .git* \
                   --exclude-glob node_modules/ \
                   --exclude-glob .env \
                   --exclude-glob storage/logs/* \
                   --exclude-glob storage/framework/cache/* \
                   --exclude-glob storage/framework/sessions/* \
                   ./ ${{ secrets.FTP_SERVER_DIR }}"
          echo "✅ Seluruh file aplikasi berhasil dikirim ke server hosting!"
